name: Build & Release

on:
  push:
    tags: ['v*']          # 推送 v* 标签 → 构建并发布 Release
  workflow_dispatch:       # 手动触发 → 只出 artifact，方便随时拿包

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'     # 项目须用 JDK 17（Gradle 7.5 不支持 JDK 21）
          cache: gradle

      - run: chmod +x gradlew

      - name: 判断是否配置了签名密钥
        id: signing
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] \
             && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置签名密钥，改用 debug 签名构建（个人使用可直接安装）"
          fi

      - name: 构建签名 Release APK
        if: steps.signing.outputs.ready == 'true'
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          ./gradlew --no-daemon clean assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          echo "APK=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"

      - name: 构建 Debug APK（未配签名密钥时）
        if: steps.signing.outputs.ready != 'true'
        run: |
          ./gradlew --no-daemon clean assembleDebug
          echo "APK=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"

      - name: 读取版本号
        id: version
        run: |
          VN=$(grep versionName app/build.gradle | head -1 | awk '{print $2}' | tr -d '"')
          echo "name=$VN" >> "$GITHUB_OUTPUT"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcam-apk
          path: ${{ env.APK }}

      - name: 发布 GitHub Release（打 tag 时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK }}
          name: VCAM ${{ github.ref_name }}
          body: |
            **VCAM ${{ steps.version.outputs.name }}** · 真实相机 + 挂件合成模式的 Xposed 虚拟摄像头

            安装与用法见 [README](https://github.com/${{ github.repository }}/blob/master/README.md)。
          draft: false
          prerelease: false
